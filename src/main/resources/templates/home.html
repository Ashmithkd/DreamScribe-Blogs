<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DreamScribe — Blogs</title>
  <link rel="stylesheet" href="home.css">
</head>
<body>
<div class="page-shell">

  <!-- Header -->
  <header class="site-header">
    <div class="site-logo">Dream<em>Scribe</em></div>
    <div class="header-actions">
      <div th:if="${userName==null}">
        <a th:href="@{/login}" style="font-family:var(--font-ui);font-size:12px;letter-spacing:.08em;font-weight:600;color:var(--parchment);opacity:.7;transition:opacity .2s" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.7'">Sign In</a>
      </div>
      <div th:if="${userName!=null}">
        <form th:action="@{/logout}" method="post" style="display:inline">
          <input type="submit" value="Sign Out" style="font-size:11px;padding:8px 18px;">
        </form>
      </div>
      <a th:href="@{/createPost}" class="btn-primary">+ New Post</a>
    </div>
  </header>
  <div class="header-rule"></div>

  <!-- Controls bar -->
  <div class="controls-bar anim-1">
    <form th:action="@{/search}" style="flex:1;min-width:220px">
      <input type="text" name="search" placeholder="Search posts, authors, tags…">
    </form>
    <div class="controls-sep"></div>
    <form th:action="@{/Home}">
      <span class="field-label" style="display:inline;margin:0 6px 0 0">Sort</span>
      <select name="sortBy">
        <option value="createdAt">Date</option>
        <option value="title">Title</option>
      </select>
      <select name="orderBy" style="margin-left:6px">
        <option value="desc">↓ Newest</option>
        <option value="asc">↑ Oldest</option>
      </select>
      <input type="submit" value="Apply" style="padding:10px 18px;font-size:11px;margin-left:8px">
    </form>
    <div class="controls-sep"></div>
    <form th:action="@{/filter}">
      <span class="field-label" style="display:inline;margin:0 6px 0 0">Filter</span>
      <select name="filterBy">
        <option value="tag">Tag</option>
        <option value="author">Author</option>
      </select>
      <input type="text" name="filterString" placeholder="Value…" style="width:130px;margin-left:6px">
      <input type="submit" value="Go" style="padding:10px 16px;font-size:11px;margin-left:8px">
    </form>
  </div>

  <!-- Section label -->
  <div class="section-heading anim-2">Latest stories</div>

  <!-- Empty state -->
  <div class="empty-state" th:if="${#lists.isEmpty(listOfPost)}">
    <div class="empty-state__icon">✦</div>
    <div class="empty-state__title">No stories yet</div>
    <div class="empty-state__msg">Be the first to share something.</div>
    <a th:href="@{/createPost}" class="btn-primary" style="margin-top:8px">Write a post</a>
  </div>

  <!-- Posts grid -->
  <div class="posts-grid" th:if="${not #lists.isEmpty(listOfPost)}">
    <div class="post-card anim-2" th:each="post, iterStat: ${listOfPost}">
      <div class="post-card__number" th:text="${'№ ' + (iterStat.index + 1)}"></div>
      <div class="post-card__title" th:text="${post.title}"></div>
      <div class="post-card__meta">
        <span th:text="${post.author}"></span>
        <span class="post-card__meta-dot">·</span>
        <span th:text="${post.createdAt}"></span>
      </div>
      <div class="post-card__tags">
        <span class="tag-pill" th:each="tags: ${post.tags}" th:text="${tags.name}"></span>
      </div>
      <div class="post-card__excerpt" th:text="${post.excerpt}"></div>
      <div class="post-card__footer">
        <a class="post-card__read" th:href="@{/post(postId=${post.id})}">Read story →</a>
        <!-- FIX: removed '+ …' — #strings.abbreviate already appends '...' -->
        <span style="font-family:var(--font-ui);font-size:10px;color:var(--muted)" th:text="${#strings.abbreviate(post.content, 55)}"></span>
      </div>
    </div>
  </div>

  <!-- Pagination -->
  <div class="pagination" th:if="${totalPage > 1}">
    <a th:if="${currentPage > 0}" th:href="@{'/Home?pageNumber=' + ${currentPage - 1}}">← Prev</a>
    <span class="page-info" th:text="${'Page ' + (currentPage + 1) + ' of ' + totalPage}"></span>
    <a th:if="${currentPage < totalPage - 1}" th:href="@{'/Home?pageNumber=' + ${currentPage + 1}}">Next →</a>
  </div>

</div>
</body>
</html>
