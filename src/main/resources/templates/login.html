<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — DreamScribe</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>
<div class="auth-bg"></div>

<div class="auth-shell">

  <!-- Brand left panel -->
  <div class="auth-brand">
    <div class="auth-brand-logo">
      Dream
      <em>Scribe</em>
    </div>
    <div class="auth-brand-tagline">Where words find their home</div>
    <blockquote class="auth-brand-quote">
      "A writer only begins a book. A reader finishes it."
    </blockquote>
  </div>

  <!-- Form right panel -->
  <div class="auth-form-panel">
    <h2>Welcome back</h2>
    <div class="auth-form-subtitle">Sign in to continue your story</div>

    <div class="error-msg" th:if="${param.error}">
      Incorrect username or password. Please try again.
    </div>

    <form th:action="@{/authenticateTheUser}" method="post">
      <div class="auth-field">
        <label class="field-label" for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="your username" required>
      </div>
      <div class="auth-field">
        <label class="field-label" for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <input type="submit" value="Sign In →" class="auth-submit">
    </form>

    <div class="auth-alt">
      New to DreamScribe? <a th:href="@{/register}">Create an account</a>
    </div>
    <div class="auth-back">
      <a th:href="@{/Home}">← Browse without signing in</a>
    </div>
  </div>

</div>
</body>
</html>
