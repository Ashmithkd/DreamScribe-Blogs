<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — DreamScribe</title>
  <link rel="stylesheet" href="register.css">
</head>
<body>
<div class="auth-bg"></div>

<div class="auth-shell">

  <!-- Brand panel -->
  <div class="auth-brand">
    <div class="auth-brand-logo">
      Dream
      <em>Scribe</em>
    </div>
    <div class="auth-brand-tagline">Join the community of writers</div>
    <blockquote class="auth-brand-quote">
      "There is no greater agony than bearing an untold story inside you."
    </blockquote>
  </div>

  <!-- Register form -->
  <div class="auth-form-panel">
    <h2>Begin your story</h2>
    <div class="auth-form-subtitle">Create your account — it's free</div>

    <form th:action="@{/processRegister}" method="post">
      <div class="auth-field">
        <label class="field-label" for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="auth-field">
        <label class="field-label" for="username">Username</label>
        <!-- FIX: was type="username" which is not a valid HTML5 input type -->
        <input type="text" id="username" name="username" placeholder="how others will know you" required autocomplete="username">
      </div>
      <div class="auth-field">
        <label class="field-label" for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="new-password">
      </div>
      <input type="submit" value="Create Account →" class="auth-submit">
    </form>

    <div class="auth-alt">
      Already a member? <a th:href="@{/login}">Sign in</a>
    </div>
    <div class="auth-back">
      <a th:href="@{/Home}">← Back to home</a>
    </div>
  </div>

</div>
</body>
</html>
