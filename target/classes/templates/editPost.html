<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Post — DreamScribe</title>
  <link rel="stylesheet" href="editPost.css">
</head>
<body>
<div class="editor-page">

  <!-- Sticky top bar -->
  <div class="editor-topbar">
    <div class="editor-topbar-logo">Dream<em>Scribe</em></div>
    <div class="editor-topbar-actions">
      <a th:href="@{/Home}" style="font-family:var(--font-ui);font-size:12px;color:var(--muted)">Discard</a>
      <input type="submit" form="editForm" value="Save Changes →" style="padding:10px 24px;font-size:12px">
    </div>
  </div>

  <!-- Editor body -->
  <div class="editor-body">
    <div class="editor-eyebrow">Editing</div>
    <h1 class="editor-title">Refine your story</h1>

    <form class="editor-form" id="editForm"  th:action="@{/processEdit}" th:object="${post}" method="post">

      <input type="hidden" th:field="*{id}">
      <input type="hidden" th:name="userId" th:value="${userId}">

      <div class="field-row">
        <div class="field-group">
          <label class="field-label">Title</label>
          <input type="text" th:field="*{title}">
        </div>
        <div class="field-group">
          <label class="field-label">Author</label>
          <input type="text" th:field="*{author}" readonly>
        </div>
      </div>

      <div class="field-row">
        <div class="field-group">
          <label class="field-label">Excerpt</label>
          <input type="text" th:field="*{excerpt}">
        </div>
        <div class="field-group">
          <label class="field-label">Tags</label>
          <input type="text" name="updatedTags" th:value="${existingTags}">
          <span class="editor-hint">Separate with commas</span>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label">Content</label>
        <textarea class="content-area" th:field="*{content}" minlength="50" maxlength="4999"></textarea>
      </div>

      <div class="editor-footer">
        <a th:href="@{/Home}" style="font-family:var(--font-ui);font-size:12px;color:var(--muted)">← Discard changes</a>
        <input type="submit" value="Save Changes →">
      </div>

    </form>
  </div>

</div>
</body>
</html>
