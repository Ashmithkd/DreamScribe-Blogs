<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Success — DreamScribe</title>
  <link rel="stylesheet" href="base.css">
  <style>
    .center {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; gap: 20px; padding: 40px 24px;
      position: relative; z-index: 2;
    }
    .logo { font-family: var(--font-disp); font-size: 26px; font-style: italic; font-weight: 300; }
    .logo em { color: var(--amber); font-style: normal; }
    .check-ring {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 1.5px solid rgba(232,162,58,0.4);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-disp);
      font-size: 32px; color: var(--amber);
      animation: fadeUp .6s both;
      box-shadow: 0 0 40px rgba(232,162,58,0.15);
    }
    h2 { font-size: 28px; font-style: italic; font-weight: 300; animation: fadeUp .6s .1s both; }
    .msg { font-family: var(--font-ui); font-size: 14px; color: var(--muted); animation: fadeUp .6s .2s both; }
  </style>
</head>
<body>
<div class="center">
  <div class="logo">Dream<em>Scribe</em></div>
  <div class="check-ring">✓</div>
  <h2>All done</h2>
  <p class="msg">Your action was completed successfully.</p>
  <form th:action="@{/Home}">
    <input type="submit" value="Back to Home →">
  </form>
</div>
</body>
</html>
